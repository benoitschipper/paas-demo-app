apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: paas-demo-app-pipeline
  labels:
    app: paas-demo-app
spec:
  params:
    - name: GIT_URL
      type: string
      description: Git repository URL
    - name: GIT_REVISION
      type: string
      description: Git revision (branch, tag, or commit SHA)
      default: main
    - name: IMAGE
      type: string
      description: Full image reference including registry and tag (e.g. quay.io/your-org/paas-demo-app:abc1234)
    - name: NAMESPACE
      type: string
      description: OpenShift namespace to deploy into

  workspaces:
    - name: source
      description: Shared workspace for source code

  tasks:
    # Task 1: Clone the Git repository
    - name: git-clone
      taskRef:
        resolver: hub
        params:
          - name: catalog
            value: tekton-catalog-tasks
          - name: type
            value: artifact
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: version
            value: "0.9"
      workspaces:
        - name: output
          workspace: source
      params:
        - name: url
          value: $(params.GIT_URL)
        - name: revision
          value: $(params.GIT_REVISION)
        - name: deleteExisting
          value: "true"

    # Task 2: Build and push the container image using Buildah
    - name: buildah
      taskRef:
        resolver: hub
        params:
          - name: catalog
            value: tekton-catalog-tasks
          - name: type
            value: artifact
          - name: kind
            value: task
          - name: name
            value: buildah
          - name: version
            value: "0.7"
      runAfter:
        - git-clone
      workspaces:
        - name: source
          workspace: source
      params:
        - name: IMAGE
          value: $(params.IMAGE)
        - name: DOCKERFILE
          value: ./Containerfile
        - name: CONTEXT
          value: .
        - name: TLSVERIFY
          value: "true"
        - name: BUILD_EXTRA_ARGS
          value: "--label git-commit=$(params.GIT_REVISION)"

    # Task 3: Trigger OpenShift rollout with the new image
    - name: deploy
      taskRef:
        resolver: hub
        params:
          - name: catalog
            value: tekton-catalog-tasks
          - name: type
            value: artifact
          - name: kind
            value: task
          - name: name
            value: openshift-client
          - name: version
            value: "0.2"
      runAfter:
        - buildah
      params:
        - name: SCRIPT
          value: |
            oc set image deployment/paas-demo-app \
              paas-demo-app=$(params.IMAGE) \
              -n $(params.NAMESPACE)
            oc rollout status deployment/paas-demo-app \
              -n $(params.NAMESPACE) \
              --timeout=120s
