apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml
  - route.yaml
  - servicemonitor.yaml

# Image override — the CI/CD pipeline updates this tag to the new commit SHA.
# ArgoCD detects the change and syncs automatically.
images:
  - name: IMAGE_PLACEHOLDER
    newName: quay.io/your-org/paas-demo-app
    newTag: latest
