apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-hook-deployer
  namespace: example-paas-dev
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments/rollout"]
    verbs: ["create", "update"]
