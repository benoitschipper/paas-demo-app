---
# Grant ArgoCD application controller admin access in example-paas-tekton
# so it can sync Tekton Pipeline, ServiceAccount, RoleBindings, PipelineRun hooks
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-controller-admin
  namespace: example-paas-tekton
subjects:
  - kind: ServiceAccount
    name: argo-service-argocd-application-controller
    namespace: example-paas-argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
---
# Grant ArgoCD application controller admin access in example-paas-dev
# so it can sync Deployment, Service, Route and create the hook Role/RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-controller-admin
  namespace: example-paas-dev
subjects:
  - kind: ServiceAccount
    name: argo-service-argocd-application-controller
    namespace: example-paas-argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
