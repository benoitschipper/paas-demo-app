apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: paas-demo-app-el
  namespace: example-paas-tekton
  labels:
    app: paas-demo-app
    eventlistener: paas-demo-app-el
spec:
  to:
    kind: Service
    name: el-paas-demo-app-el
  port:
    targetPort: http-listener
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
