# ArgoCD API Token Secret Template
#
# This file is a REFERENCE ONLY and is NOT included in kustomization.yaml.
# An operator must manually create this Secret in the example-paas-tekton namespace
# before the pipeline can trigger ArgoCD syncs.
#
# Steps to create the ArgoCD API token:
#   1. Log in to ArgoCD:
#        argocd login argocd-server.example-paas-argocd.svc --insecure
#   2. Create an account token (or use an existing admin token):
#        argocd account generate-token --account <account-name>
#   3. Create the Secret in OpenShift:
#        oc create secret generic argocd-token \
#          --from-literal=token=<your-argocd-api-token> \
#          -n example-paas-tekton
#
# The token must have permission to sync the paas-demo-deploy application.
# Minimum required ArgoCD RBAC policy:
#   p, role:sync-paas-demo-deploy, applications, sync, default/paas-demo-deploy, allow
#   p, role:sync-paas-demo-deploy, applications, get, default/paas-demo-deploy, allow
#
# Secret structure (for reference):
#
# apiVersion: v1
# kind: Secret
# metadata:
#   name: argocd-token
#   namespace: example-paas-tekton
# type: Opaque
# stringData:
#   token: <argocd-api-bearer-token>
