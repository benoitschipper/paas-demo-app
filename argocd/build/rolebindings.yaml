---
# Allow the pipeline SA to manage resources in the build namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: paas-demo-pipeline-edit
  namespace: example-paas-tekton
subjects:
  - kind: ServiceAccount
    name: paas-demo-pipeline
    namespace: example-paas-tekton
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
---
# Allow the pipeline SA to push images to the internal registry
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: paas-demo-pipeline-registry-editor
  namespace: example-paas-tekton
subjects:
  - kind: ServiceAccount
    name: paas-demo-pipeline
    namespace: example-paas-tekton
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:image-builder
