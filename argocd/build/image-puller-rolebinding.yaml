# Allow all service accounts in example-paas-dev to pull images
# from the internal registry in example-paas-tekton
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: image-puller-from-paas-dev
  namespace: example-paas-tekton
subjects:
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: system:serviceaccounts:example-paas-dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:image-puller
