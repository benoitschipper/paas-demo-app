apiVersion: batch/v1
kind: Job
metadata:
  name: rollout-restart
  namespace: example-paas-tekton
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: argocd-hook
      restartPolicy: Never
      containers:
        - name: oc
          image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
          command:
            - /bin/sh
            - -c
            - |
              oc rollout restart deployment/paas-demo-app -n example-paas-dev
              oc rollout status deployment/paas-demo-app -n example-paas-dev --timeout=120s
