---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: paas-demo-el
  namespace: example-paas-tekton
  labels:
    app: paas-demo-app
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: paas-demo-el-triggers
  namespace: example-paas-tekton
  labels:
    app: paas-demo-app
subjects:
  - kind: ServiceAccount
    name: paas-demo-el
    namespace: example-paas-tekton
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tekton-triggers-eventlistener-roles
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: paas-demo-el-pipelinerun-create
  namespace: example-paas-tekton
  labels:
    app: paas-demo-app
subjects:
  - kind: ServiceAccount
    name: paas-demo-el
    namespace: example-paas-tekton
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tekton-triggers-aggregate-to-listener
