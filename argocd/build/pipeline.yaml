apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  name: paas-demo-app-pipeline
  labels:
    app: paas-demo-app
spec:
  params:
    - name: GIT_URL
      type: string
      description: Git repository URL
    - name: GIT_REVISION
      type: string
      description: Git revision (branch, tag, or commit SHA)
      default: main
    - name: IMAGE
      type: string
      description: Full image reference to build and push
      default: image-registry.openshift-image-registry.svc:5000/example-paas-tekton/paas-demo-app:latest

  workspaces:
    - name: source
      description: Shared workspace for source code

  results:
    - name: IMAGE_DIGEST
      description: Digest of the built image
      value: $(tasks.buildah.results.IMAGE_DIGEST)

  tasks:
    # Task 1: Clone the Git repository
    - name: git-clone
      taskRef:
        resolver: hub
        params:
          - name: catalog
            value: tekton-catalog-tasks
          - name: type
            value: artifact
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: version
            value: "0.9"
      workspaces:
        - name: output
          workspace: source
      params:
        - name: url
          value: $(params.GIT_URL)
        - name: revision
          value: $(params.GIT_REVISION)
        - name: deleteExisting
          value: "true"

    # Task 2: Build and push the container image (rootless buildah, compatible with pipelines-scc)
    - name: buildah
      runAfter:
        - git-clone
      workspaces:
        - name: source
          workspace: source
      params:
        - name: IMAGE
          value: $(params.IMAGE)
        - name: GIT_REVISION
          value: $(params.GIT_REVISION)
      taskSpec:
        params:
          - name: IMAGE
            type: string
          - name: GIT_REVISION
            type: string
        workspaces:
          - name: source
        results:
          - name: IMAGE_DIGEST
            description: Digest of the built image
        steps:
          - name: build-and-push
            image: registry.redhat.io/rhel8/buildah:latest
            workingDir: $(workspaces.source.path)
            securityContext:
              runAsNonRoot: true
              seccompProfile:
                type: RuntimeDefault
              capabilities:
                drop:
                  - ALL
            env:
              - name: STORAGE_DRIVER
                value: vfs
            script: |
              #!/usr/bin/env bash
              set -euo pipefail

              buildah --storage-driver=vfs bud \
                --label git-commit=$(params.GIT_REVISION) \
                --format=oci \
                -t $(params.IMAGE) \
                -f ./Dockerfile \
                .

              buildah --storage-driver=vfs push \
                --digestfile /tmp/image-digest \
                $(params.IMAGE) \
                docker://$(params.IMAGE)

              cat /tmp/image-digest | tee $(results.IMAGE_DIGEST.path)
