apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  name: paas-demo-app-pipeline
  labels:
    app: paas-demo-app
spec:
  params:
    - name: GIT_URL
      type: string
      description: Git repository URL
    - name: GIT_REVISION
      type: string
      description: Git revision (branch, tag, or commit SHA)
      default: main
    - name: IMAGE
      type: string
      description: Full image reference to build and push
      default: image-registry.openshift-image-registry.svc:5000/example-paas-tekton/paas-demo-app:latest

  workspaces:
    - name: source
      description: Shared workspace for source code

  results:
    - name: IMAGE_DIGEST
      description: Digest of the built image
      value: $(tasks.buildah.results.IMAGE_DIGEST)

  tasks:
    # Task 1: Clone the Git repository
    - name: git-clone
      taskRef:
        resolver: hub
        params:
          - name: catalog
            value: tekton-catalog-tasks
          - name: type
            value: artifact
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: version
            value: "0.9"
      workspaces:
        - name: output
          workspace: source
      params:
        - name: url
          value: $(params.GIT_URL)
        - name: revision
          value: $(params.GIT_REVISION)
        - name: deleteExisting
          value: "true"

    # Task 2: Build and push the container image to the internal OpenShift registry
    - name: buildah
      taskRef:
        resolver: hub
        params:
          - name: catalog
            value: tekton-catalog-tasks
          - name: type
            value: artifact
          - name: kind
            value: task
          - name: name
            value: buildah
          - name: version
            value: "0.7"
      runAfter:
        - git-clone
      workspaces:
        - name: source
          workspace: source
      params:
        - name: IMAGE
          value: $(params.IMAGE)
        - name: DOCKERFILE
          value: ./Dockerfile
        - name: CONTEXT
          value: .
        - name: TLSVERIFY
          value: "true"
        - name: BUILD_EXTRA_ARGS
          value: "--label git-commit=$(params.GIT_REVISION)"
