apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: paas-demo-app-template
  namespace: example-paas-tekton
spec:
  params:
    - name: GIT_REVISION
      description: The git commit SHA
    - name: GIT_URL
      description: The git repository clone URL
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: paas-demo-app-run-
        namespace: example-paas-tekton
      spec:
        pipelineRef:
          name: paas-demo-app-pipeline
        serviceAccountName: paas-demo-pipeline
        params:
          - name: GIT_URL
            value: $(tt.params.GIT_URL)
          - name: GIT_REVISION
            value: $(tt.params.GIT_REVISION)
          - name: IMAGE
            value: image-registry.openshift-image-registry.svc:5000/example-paas-tekton/paas-demo-app:latest
        workspaces:
          - name: source
            volumeClaimTemplate:
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 1Gi
