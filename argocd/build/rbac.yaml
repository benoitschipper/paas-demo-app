---
# Grant the pipeline ServiceAccount broad edit access in the tekton namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: paas-demo-pipeline-edit
  namespace: example-paas-tekton
  labels:
    app: paas-demo-app
subjects:
  - kind: ServiceAccount
    name: paas-demo-pipeline
    namespace: example-paas-tekton
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
---
# Grant the pipeline ServiceAccount image push access to the OpenShift internal registry
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: paas-demo-pipeline-image-builder
  namespace: example-paas-tekton
  labels:
    app: paas-demo-app
subjects:
  - kind: ServiceAccount
    name: paas-demo-pipeline
    namespace: example-paas-tekton
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:image-builder
