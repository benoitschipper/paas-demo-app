apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: paas-demo-app
  labels:
    app: paas-demo-app
    app.kubernetes.io/name: paas-demo-app
    # Required label for OpenShift Monitoring to pick up this ServiceMonitor
    # when user workload monitoring is enabled in the namespace.
    openshift.io/cluster-monitoring: "true"
spec:
  selector:
    matchLabels:
      app: paas-demo-app
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scheme: http
