apiVersion: apps/v1
kind: Deployment
metadata:
  name: paas-demo-app
  labels:
    app: paas-demo-app
    app.kubernetes.io/name: paas-demo-app
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paas-demo-app
  template:
    metadata:
      labels:
        app: paas-demo-app
        app.kubernetes.io/name: paas-demo-app
    spec:
      # restricted-v2 SCC compliance: no root, no privilege escalation
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: paas-demo-app
          # Image digest is updated automatically by the Tekton git-commit-push task after each build.
          # Do not edit this field manually — it will be overwritten on the next pipeline run.
          image: image-registry.openshift-image-registry.svc:5000/example-paas-tekton/paas-demo-app@sha256:b9f2eb97d9619d69d3595d43a150c7025544b93501c130e14bdfa8eaa71d7a92
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
