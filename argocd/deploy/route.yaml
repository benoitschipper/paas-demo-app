apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: paas-demo-app
  labels:
    app: paas-demo-app
    app.kubernetes.io/name: paas-demo-app
spec:
  to:
    kind: Service
    name: paas-demo-app
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
