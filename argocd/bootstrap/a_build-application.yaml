apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: paas-demo-deploy
  namespace: example-paas-argocd
spec:
  project: default
  source:
    repoURL: https://github.com/benoitschipper/paas-demo-app.git
    targetRevision: main
    path: argocd/build
  destination:
    server: https://kubernetes.default.svc
    namespace: example-paas-dev
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=false